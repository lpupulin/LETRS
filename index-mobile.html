<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <title>LETRS</title>

    <link rel="stylesheet" href="./resources/main.css" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="./resources/jquery.nicescroll.min.js"></script>

    <script type="module">
        import MagicScroll from "./resources/MagicScroll.js";

        /*
        Optional smooth scroll

        let magicScroll = new MagicScroll({
            target: document.querySelector("body"),
            speed: 80,
            smooth: 12
        });
        */

        /*
        Optional NiceScroll

        $(function () {
            $("body").niceScroll();
        });
        */
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
            background: black;
        }

        #set-height {
            display: block;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100vh;

            object-fit: cover;

            z-index: -1;
            background: black;
        }
    </style>
</head>

<body>

    <div id="set-height"></div>

    <video
        class="party_scroll"
        id="v0"
        tabindex="0"
        preload="auto"
        muted
        playsinline
        webkit-playsinline
    >
        <source
            src="https://NH-video.b-cdn.net/About_letrs.mp4"
            type='video/mp4; codecs="avc1.42E01E, mp4a.40.2"'
        />
    </video>

    <script src="./resources/script.js"></script>

    <script>

        enterView({
            selector: "section",
            enter: function (el) {
                el.classList.add("entered");
            }
        });

        // ---------------------------------------
        // VIDEO SCROLL PLAY
        // ---------------------------------------

        const playbackConst = 1200;

        const setHeight = document.getElementById("set-height");

        const vid = document.getElementById("v0");

        // Important for iOS Safari
        vid.pause();

        // Set page height based on video duration
        vid.addEventListener("loadedmetadata", function () {

            setHeight.style.height =
                Math.floor(vid.duration) * playbackConst + "px";

        });

        // Smooth scroll video playback
        function scrollPlay() {

            const frameNumber = window.pageYOffset / playbackConst;

            // Throttle updates for mobile performance
            if (Math.abs(vid.currentTime - frameNumber) > 0.03) {

                vid.currentTime = frameNumber;

            }

            window.requestAnimationFrame(scrollPlay);
        }

        // Wait until enough video data is loaded
        vid.addEventListener("loadeddata", function () {

            window.requestAnimationFrame(scrollPlay);

        });

    </script>

</body>
</html>
